services:
  postgres:
    image: postgres:16
    container_name: tennis-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tennis_booking
      POSTGRES_USER: tennis_user
      POSTGRES_PASSWORD: tennis_amaro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: