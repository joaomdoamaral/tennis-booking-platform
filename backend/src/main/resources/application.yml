spring:
  application:
    name: tennis-booking-api
  datasource:
    url: jdbc:postgresql://localhost:5432/tennis_booking
    username: tennis_user
    password: tennis_pass
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  jwt:
    secret: my-super-secret-key-my-super-secret-key-123456
    expiration: 86400000